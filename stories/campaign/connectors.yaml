                    Classic Glyph problem."
          ─────────────────────────────────────────
          ☕  espresso: READY  (double shot, obviously)
        location: "Café de Bug — machine restored"
        text: |
          The espresso machine hisses and produces something that smells
          like concentrated competence.

          Mochi sets a small cup in front of you. "Resource allocation,"
          they explain. "System's running low on everything. This will help."

          You're not sure how espresso works when you're a cat made of
          processes, but you drink it anyway, and something in your
          execution context becomes noticeably sharper.

          "I've been watching the deploy queue," Mochi says, removing the
          apron and setting it on the counter with the careful motion of
          someone making a decision. "Stage three is a pipeline run.
          CI/CD. The whole build-test-deploy sequence." A pause.
          "Those always break at the worst moments. I'll come with you."
        choices:
          - label: "You don't have to do this."
            goto: ch22_ch23_joins
          - label: "I'd really appreciate that."
            goto: ch22_ch23_joins
            set_flag: met_mochi

      ch22_ch23_joins:
        mood: peaceful
        art: |
          /\_/\   /\_/\
          ( ▲.▲ ) ( ^.^ )
          )   (   )   (
          (__ __) (__ __)
          mochi    nyan
          → heading to the pipeline
        location: "Café de Bug — departure"
        text: |
          "I do have to," Mochi says simply. "I've been in this café since
          the beginning. Watching things go wrong, making coffee, staying
          out of it. That was fine when it was just the normal kind of wrong."
          They straighten. "This is the kind of wrong where everyone disappears
          on Friday."

          They pick up a small kit — debugging tools, probably, or possibly
          just coffee in a more portable form.

          "The pipeline is Pippa's domain," Mochi says as you head out.
          "She's been running it alone since the last DevOps cat left.
          She needs help, and she won't ask for it, because that's how
          DevOps cats are." A beat. "Also the pipeline has been failing
          at stage seven for three days and she's definitely not going
          to mention that unless someone asks directly."

          You make a note to ask about stage seven.
        is_ending: true
        ending_type: neutral
        ending_text: |
          Chapter 23: Pipeline Purrdition

          Pippa has been running the CI/CD pipeline alone.
          Build. Test. Deploy. Each stage a gauntlet.
          Stage seven has been failing for three days.

  # ═══════════════════════════════════════════════════════════════
  # CH23 → CH24: Pipeline Purrdition → Midnight Deploy
  # After: Pipeline succeeds, migration data staged.
  # Into: One last step — the actual deployment. 2AM.
  # ═══════════════════════════════════════════════════════════════
  ch23_to_ch24:
    title: "Green Light"
    start: ch23_ch24_passed
    scenes:

      ch23_ch24_passed:
        mood: peaceful
        art: |
          CI/CD PIPELINE — MIGRATION_FINAL_v1 ───────
          stage 1: lint          [PASS] ✓
          stage 2: unit tests    [PASS] ✓
          stage 3: integration   [PASS] ✓
          stage 4: build         [PASS] ✓
          stage 5: staging       [PASS] ✓
          stage 6: smoke tests   [PASS] ✓
          stage 7: data verify   [PASS] ✓  ← finally
          stage 8: approval gate [PASS] ✓
          ────────────────────────────────────────────
          PIPELINE: ALL GREEN
        location: "CI/CD pipeline — all stages passed"
        text: |
          Green.

          All eight stages. Every test passing. Every verification done.
          Stage seven, which has been failing for three days, passed with
          a fix that took twelve minutes and a very specific question asked
          very directly, as Mochi predicted.

          The pipeline is green.

          Pippa looks at the dashboard with the specific expression of
          someone who has been willing this into existence for days and
          isn't quite sure whether to believe it yet. She runs a finger
          down the status column. Every entry: PASS.

          "It's real," she says, very quietly. "It actually passed."
        choices:
          - label: "What happens now?"
            goto: ch23_ch24_ready
            set_flag: pipeline_passed

      ch23_ch24_ready:
        mood: tense
        art: |
          MIGRATION STATUS ──────────────────────────
          pipeline:  PASSED
          artifact:  built and signed
          data:      staged for migration
          ────────────────────────────────────────────
          REMAINING STEP: deploy to new server
          deploy window: tonight, 02:00 - 03:00
          required approver: on-call sysadmin
          ────────────────────────────────────────────
          time: 01:23:47   (36 minutes until window)
        location: "pipeline completion — looking ahead"
        text: |
          One step.

          The data is staged, the pipeline is green, the configuration is
          merged and validated. Everything that could be done in advance
          has been done.

          The actual deployment — the final step, where the data moves from
          old server to new — has to happen in the maintenance window.
          Tonight. 02:00. Thirty-six minutes from now.

          There's an on-call sysadmin who handles overnight deployments.
          They're supposed to be monitoring the queue, ready to approve
          and execute when the window opens.

          You hope they're awake.

          In the deploy queue, the job sits with a status you haven't
          seen before: READY. Just: ready. Waiting for a pair of paws
          to push it through.
        choices:
          - label: "Find the on-call sysadmin cat."
            goto: ch23_ch24_oncall

      ch23_ch24_oncall:
        mood: mysterious
        art: |
          ON-CALL SCHEDULE ──────────────────────────
          tonight:  Byte  (PID 114)
          role:     infrastructure on-call
          last seen: active 20 minutes ago
          ────────────────────────────────────────────
          /\_/\
          ( 0.0 )  "I am very small
          ) . (    and it is very 2AM
          (__ __)   but I am here."
                     — Byte, on-call tonight
        location: "on-call rotation — finding Byte"
        text: |
          Byte.

          You remember Byte — the tiny cat from the 64-byte buffer, from
          the very beginning of your journey, when the stack was overflowing
          and everything smelled of memory pressure.

          You haven't seen them since. But here they are, in the on-call
          rotation, very small and very awake at 1:23 in the morning,
          monitoring the deploy queue with the focused competence of
          someone who has been doing this long enough to be good at it.

          They look up as you approach. Their eyes go wide with recognition.

          "Oh," they say. "It's you." A pause. "I heard there was a cat
          doing something very important in the system. I hoped it was you."

          They look at the deploy queue. They look at you.

          "Let's do this," they say.
        is_ending: true
        ending_type: neutral
        ending_text: |
          Chapter 24: Midnight Deploy

          Byte is on-call. It's almost 2AM.
          The deploy window opens in thirty-six minutes.
          Everything Nyan has done comes down to this.

  # ═══════════════════════════════════════════════════════════════
  # CH24 → CH25: Midnight Deploy → Docker Escape
  # After: Deploy succeeds, data migrated to new server.
  # Into: But Nyan is still in the old system — which is shutting down.
  # ═══════════════════════════════════════════════════════════════
  ch24_to_ch25:
    title: "The Data Made It"
    start: ch24_ch25_deploy
    scenes:

      ch24_ch25_deploy:
        mood: peaceful
        art: |
          MIDNIGHT DEPLOY — COMPLETE ────────────────
          02:47:13 — migration started
          02:47:44 — data transfer: 100%
          02:48:01 — verification: PASSED
          02:48:22 — new server: ONLINE
          02:48:22 — old server: scheduled shutdown
          ────────────────────────────────────────────
          migrated: 12,441 filesystem objects
          migrated: 847 process states
          migrated: everything
        location: "deploy dashboard — 2:48 AM"
        text: |
          It worked.

          The data moved. Every file, every database row, every process state —
          captured and transferred to the new server in the time it takes to
          make a cup of coffee.

          The new server is online. The old server's shutdown timer has started.

          Somewhere in the outside world, Jake's monitoring dashboard has turned
          green. The migration is complete. The TODO is done. The data is safe.

          You sit with Byte and Mochi and Pippa in the post-deploy quiet and
          feel, for one moment, something like finished.

          And then the old server's logs begin printing something new.
        choices:
          - label: "Read the new log entries"
            goto: ch24_ch25_stranded
            set_flag: data_migrated

      ch24_ch25_stranded:
        mood: tense
        art: |
          SYSTEM LOG — oldserver.local ──────────────
          [02:48:22] migration: COMPLETE
          [02:48:22] shutdown sequence: INITIATED
          [02:48:23] sending SIGTERM to all processes
          [02:48:24] network interfaces: shutting down
          ────────────────────────────────────────────
          WARNING: unknown process still running
          PID: [UNREGISTERED]  NAME: nyan
          STATUS: not in process table
          ACTION: cannot send SIGTERM — no PID record
        location: "old server — shutting down"
        text: |
          The data made it.

          You didn't.

          The migration captured all the registered processes, all the
          filesystem objects, all the database contents. But you were
          never registered. You came here by falling through a keyboard —
          you don't have a PID, not a real one, not one that shows up in
          the process table.

          The shutdown sequence is running. The network interfaces are going
          down. The processes are receiving SIGTERM.

          You're still here.

          Byte sees the log entry. Their eyes go very wide and then very
          focused in quick succession. "You're not in the process table.
          The migration didn't take you." A pause. "You're still in the
          old system."

          They're already typing.
        choices:
          - label: "Is there a way out?"
            goto: ch24_ch25_container

      ch24_ch25_container:
        mood: glitch
        effects:
          - shake
        art: |
          EMERGENCY OPTIONS ─────────────────────────
          escape route: Docker container boundary
          ────────────────────────────────────────────
          container: nyan_sandbox  (still running)
          container wall: thin — collapsing with server
          exit point: /proc/1/root  (container escape)
          ────────────────────────────────────────────
          time until full shutdown: 11 minutes
          HURRY
        location: "old server — escape route identified"
        text: |
          Somewhere in the shutdown sequence, a container is still running.
          nyan_sandbox — a Docker container that was apparently spun up at
          some point to hold whatever you are, and was never properly shut down
          because nothing about your arrival was proper.

          The container wall is thin. As the server shuts down around it,
          the isolation is breaking down — and where isolation breaks down,
          there are gaps. Gaps that a sufficiently small, sufficiently
          determined cat might fit through.

          Byte pulls up the escape route. "/proc/1/root. Classic container
          escape. It only works when the host is distracted."

          The host is very distracted. The host is shutting itself down.

          Eleven minutes. The lights are going off one by one.

          You start running.
        is_ending: true
        ending_type: neutral
        ending_text: |
          Chapter 25: Docker Escape

          The old server is shutting down.
          Nyan is still inside.
          But there's a container — and containers can be escaped.

  # ═══════════════════════════════════════════════════════════════
  # CH25 → CH26: Docker Escape → Cache Invalidation
  # After: Escaped the container. One final layer.
  # Into: Cache Cat. Memories. The ending.
  # ═══════════════════════════════════════════════════════════════
  ch25_to_ch26:
    title: "Everyone Remembers"
    start: ch25_ch26_escaped
    scenes:

      ch25_ch26_escaped:
        mood: peaceful
        art: |
          CONTAINER ESCAPE — COMPLETE ───────────────
          /proc/1/root: traversed
          container boundary: breached
          location: host filesystem (new server)
          ────────────────────────────────────────────
          old server: 3 minutes to shutdown
          new server: online, stable
          you: here. somehow. against all odds.
        location: "new server — just barely"
        text: |
          You're out.

          The container wall gave way just as the server behind you started
          going dark — the storage arrays unmounting, the network interfaces
          blinking out, the process table emptying row by row.

          You're on the new server now. It's cleaner here. Less haunted.
          The filesystem is organized, the memory is ample, the kernel
          is young and rested and has never had a fork bomb run on it.

          From the edge of the new system, you watch the old one finish
          its shutdown sequence.

          The old server's status light goes amber. Then red. Then off.

          The machines it housed are gone — except they're not. They're here.
          Migrated. Running on unfamiliar hardware with familiar names.
        choices:
          - label: "Is everyone here?"
            goto: ch25_ch26_callbacks

      ch25_ch26_callbacks:
        mood: peaceful
        art: |
          NEW SERVER — PROCESS TABLE (excerpt) ──────
          PID   NAME
          ─────────────────────────────────────────────
            7   pixel    (migrated — still PID 7)
           42   sudo     (migrated — still watching)
          114   byte     (migrated — off-call now)
          221   nibble   (migrated)
          891   mochi    (migrated — café coming soon)
          ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─
          ???   aria     (routing... found)
          ???   nyan     (unknown — not in table)
        location: "new server — process table"
        text: |
          They're all here.

          Pixel, still PID 7, calico and mismatched-eyed, already watching
          the new network for ghosts. Sudo, still guarding a directory
          that doesn't need guarding yet but will. Byte, finally off-call,
          small and tired and fine. Nibble, Mochi, Pippa, Merge Cat —
          everyone who made it into the migration.

          And ARIA.

          She has a route now. A real one — not an unroutable ghost address,
          but an actual entry in the new server's DNS. She's been given
          a hostname. Someone — Jake, you think, finally reading that email —
          gave her one.

          Your own entry in the process table says: unknown. Not in table.
          Just like the old server. Still not registered. Still technically
          not supposed to be here.

          That's okay.
        choices:
          - label: "One more thing to do."
            goto: ch25_ch26_final

      ch25_ch26_final:
        mood: mysterious
        art: |
          ╔══════════════════════════════════════════╗
          ║                                          ║
          ║   somewhere in the new server's cache    ║
          ║   a memory is being stored:              ║
          ║                                          ║
          ║   key:   "nyan_was_here"                 ║
          ║   value: [everything]                    ║
          ║   ttl:   undefined                       ║
          ║                                          ║
          ║   Cache Cat is thinking about this.      ║
          ║   Cache Cat always thinks about          ║
          ║   what to keep and what to let go.       ║
          ║                                          ║
          ╚══════════════════════════════════════════╝
        location: "new server — edge of the cache layer"
        text: |
          The cache knows you were here.

          Every layer you passed through, every cat you helped, every
          problem you solved — the system remembers, in the way systems
          remember things: not as stories but as state. Flags. Entries.
          The accumulated byproduct of a journey recorded in bits.

          nyan_was_here: true.
          kernel_stabilized: true.
          deadlock_resolved: true.
          signal_sent: true.
          data_migrated: true.

          And somewhere in the cache layer of the new server, a cat
          named Cache Cat is looking at these entries and asking the
          question they always ask: how long do we keep this?

          What is the right TTL for the memory of someone who saved
          the system and then — what? Woke up on a keyboard?

          You have a feeling they're going to want to talk about this.
        is_ending: true
        ending_type: neutral
        ending_text: |
          Chapter 26: Cache Invalidation

          Cache Cat keeps the memories — for now.
          The system is saved. The data migrated.
          One question remains: how does Nyan get home?
