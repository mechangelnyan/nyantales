    start: ch18_ch19_compose
    scenes:

      ch18_ch19_compose:
        mood: peaceful
        art: |
          SIGNAL COMPOSITION ────────────────────────
          authors:  Nyan + Glyph
          encoding: UTF-8 (guaranteed)
          payload:  DISTRESS + migration_request
          ────────────────────────────────────────────
          "oldserver.local scheduled decommission
           Friday 00:00 — data NOT migrated —
           847 processes at risk — please respond
           contact: jake@local — urgent"
          ────────────────────────────────────────────
          checksum: valid  |  encoding: verified
        location: "encoding layer — signal composed"
        text: |
          Glyph is meticulous about this.

          "Every system that touches this message will try to interpret it,"
          they explain, working through the encoding with careful precision.
          "If it's not exactly right — if one byte is wrong — the meaning
          changes. Or it's dropped. Or it turns into a question mark."

          You've seen what question marks do to things that were supposed
          to be meaningful.

          Together, you encode the distress signal: plaintext, UTF-8,
          valid headers, the exact format that a monitoring system would
          recognize as urgent. DECOMMISSION. NOT MIGRATED. URGENT.

          "There," says Glyph, quietly satisfied. "Anyone who reads this
          will understand it. Even systems that usually don't understand me."
          A pause. "The next part is getting it past the firewall."
        choices:
