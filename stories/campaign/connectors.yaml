        mood: tense
        art: |
          FIREWALL RULE (outbound) ──────────────────
          rule #47: DROP if payload matches:
          ^(?:(?!migrate|urgent|decommission).)*$
          ────────────────────────────────────────────
          translation: only pass traffic that contains
          the words "migrate", "urgent", or "decommission"
          (written by someone who never tested catastrophic
          backtracking on strings longer than 40 chars)
        location: "firewall rule inspection"
        text: |
          Glyph shows you the outbound firewall rule.

          It's a regex. Someone wrote a pattern matcher to filter outbound
          traffic — specifically, to flag messages that contain certain
          keywords as potentially sensitive. The idea was to prevent data
          leaks. The implementation is a regex that will backtrack catastrophically
          on any string longer than about forty characters.

          Your distress signal is two hundred characters.

          "The rule will either match it correctly, or it will spend the
          next several years trying to match it and grinding the firewall
          process to a halt," Glyph says. "Either way, the signal needs
          to get through."

          They look at you. "There's someone who lives in the regex engine.
          A cat named Caret. They know it from the inside."
