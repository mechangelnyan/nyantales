# NyanTales: The Campaign
# Master manifest for the connected narrative campaign.
# Defines chapter order, story mappings, act structure, and bonus chapters.

title: "NyanTales: The Campaign"
description: "One connected story. 26 chapters. One cat trying to get home."
version: "1.0.0"

# Flags that persist across chapters (carried from story to story)
# Add a flag here to make the campaign remember it between chapters.
persistent_flags:
  - met_sudo
  - met_tabby
  - freed_tabby
  - met_byte
  - met_stack_canary
  - met_whisker
  - freed_whisker
  - met_dangling
  - met_pointer
  - met_recurse
  - met_zombie_cat
  - heard_of_aria
  - met_aria
  - aria_fragment_1
  - aria_fragment_2
  - aria_fragment_3
  - knows_decommission
  - sent_distress_signal
  - met_pixel
  - met_mochi
  - merge_complete
  - pipeline_passed
  - data_migrated

# Items that persist across chapters
persistent_items:
  - fish_treat
  - stack_canary_fragment
  - aria_message_fragment
  - decommission_notice
  - signal_key

# Act definitions (for display purposes)
acts:
  - id: act1
    title: "ACT I — BOOT"
    subtitle: "Nyan enters the system. Learns the basics. Explores filesystem and memory."
    chapters: [1, 2, 3, 4, 5]

  - id: act2
    title: "ACT II — RUNTIME"
    subtitle: "Deeper into the system's internals. The problems get worse. Recurring characters."
    chapters: [6, 7, 8, 9, 10, 11, 12]

  - id: act3
    title: "ACT III — NETWORK"
    subtitle: "Nyan enters the network. Meets ARIA. Learns the truth."
    chapters: [13, 14, 15, 16, 17, 18, 19]

  - id: act4
    title: "ACT IV — DEPLOY"
    subtitle: "The endgame. Save the system or escape. All threads converge."
    chapters: [20, 21, 22, 23, 24]

  - id: act5
    title: "ACT V — HOME"
    subtitle: "Resolution."
    chapters: [25, 26]

# Main chapter sequence
chapters:
  # ── ACT I — BOOT ──────────────────────────────────────────────

  - index: 0
    chapter: 1
    title: "The Terminal Cat"
    story: the-terminal-cat
    act: act1
    description: "Nyan wakes up inside the computer. Tutorial — learn movement, choices, the world."
    connector_to_next: ch1_to_ch2

  - index: 1
    chapter: 2
    title: "Permission Denied"
    story: permission-denied
    act: act1
    description: "Nyan meets Sudo. Together they navigate UNIX permissions."
    connector_to_next: ch2_to_ch3

  - index: 2
    chapter: 3
    title: "Vim Escape"
    story: vim-escape
    act: act1
    description: "Nyan accidentally opens vim. Comic relief — Tabby is trapped inside."
    connector_to_next: ch3_to_ch4

  - index: 3
    chapter: 4
    title: "Buffer Overflow"
    story: buffer-overflow
    act: act1
    description: "Nyan meets Byte in a 64-byte buffer. The Stack Canary. First real danger."
    connector_to_next: ch4_to_ch5

  - index: 4
    chapter: 5
    title: "Garbage Collection"
    story: garbage-collection
    act: act1
    description: "Whisker is desperately trying to stay reachable. The GC is coming."
    connector_to_next: ch5_to_ch6

  # ── ACT II — RUNTIME ──────────────────────────────────────────

  - index: 5
    chapter: 6
    title: "Memory Leak"
    story: memory-leak
    act: act2
    description: "Nyan meets Nibble, hunting a massive memory leak. Dangling appears."
    connector_to_next: ch6_to_ch7

  - index: 6
    chapter: 7
    title: "Segmentation Fault"
    story: segfault
    act: act2
    description: "Nyan meets Pointer in forbidden memory. Dangling appears again."
    connector_to_next: ch7_to_ch8

  - index: 7
    chapter: 8
    title: "Stack Overflow"
    story: stack-overflow
    act: act2
    description: "Recurse is trapped in infinite recursion. Closure remembers the base case."
    connector_to_next: ch8_to_ch9

  - index: 8
    chapter: 9
    title: "Zombie Process"
    story: zombie-process
    act: act2
    description: "Zombie Cat called exit(0) cleanly. Jake never called wait()."
    connector_to_next: ch9_to_ch10

  - index: 9
    chapter: 10
    title: "Fork Bomb"
    story: fork-bomb
    act: act2
    description: ":(){ :|:& };: — Fork Bomb Cat is deeply regretful. The system chokes."
    connector_to_next: ch10_to_ch11

  - index: 10
    chapter: 11
    title: "Kernel Panic"
    story: kernel-panic
    act: act2
    description: "Nyan plays with Pixel (PID 7) to prevent a full kernel panic."
    connector_to_next: ch11_to_ch12

  - index: 11
    chapter: 12
    title: "Deadlock"
    story: deadlock
    act: act2
    description: "Four philosopher cats deadlocked over shared fish. Nyan must be the scheduler."
    connector_to_next: ch12_to_ch13

  # ── ACT III — NETWORK ─────────────────────────────────────────

  - index: 12
    chapter: 13
    title: "DNS Quest"
    story: dns-quest
    act: act3
    description: "Nyan rides a DNS packet with Query, searching for home.cat."
    connector_to_next: ch13_to_ch14

  - index: 13
    chapter: 14
    title: "404 Not Found"
    story: 404-not-found
    act: act3
    description: "Nyan meets Packet, searching for a vanished page. ARIA's dashboard."
    connector_to_next: ch14_to_ch15

  - index: 14
    chapter: 15
    title: "The Haunted Network"
    story: haunted-network
    act: act3
    description: "Pixel and ARIA. The truth: Jake is decommissioning the server."
    connector_to_next: ch15_to_ch16

  - index: 15
    chapter: 16
    title: "TLS Pawshake"
    story: tls-pawshake
    act: act3
    description: "Nyan helps negotiate trust. Chroma, Serif, Nginx."
    connector_to_next: ch16_to_ch17

  - index: 16
    chapter: 17
    title: "SQL Injection"
    story: sql-injection
    act: act3
    description: "Pixel is trapped in a database. Jake's decommission order is in there."
    connector_to_next: ch17_to_ch18

  - index: 17
    chapter: 18
    title: "Encoding Error"
    story: encoding-error
    act: act3
    description: "Glyph, a UTF-8 cat in an ASCII world. Identity. Being understood."
    connector_to_next: ch18_to_ch19

  - index: 18
    chapter: 19
    title: "Regex Catastrophe"
    story: regex-catastrophe
    act: act3
    description: "Caret inside a regex engine. The distress signal must get through."
    connector_to_next: ch19_to_ch20

  # ── ACT IV — DEPLOY ───────────────────────────────────────────

  - index: 19
    chapter: 20
    title: "Race Condition"
    story: race-condition
    act: act4
    description: "Two threads fight over the last sunbeam. Racing against the decommission clock."
    connector_to_next: ch20_to_ch21

  - index: 20
    chapter: 21
    title: "Merge Conflict"
    story: merge-conflict
    act: act4
    description: "Merge Cat between two realities. The old server and the new."
    connector_to_next: ch21_to_ch22

  - index: 21
    chapter: 22
    title: "Café Debug"
    story: cafe-debug
    act: act4
    description: "Mochi the barista. A waypoint. The cats gather before the final push."
    connector_to_next: ch22_to_ch23

  - index: 22
    chapter: 23
    title: "Pipeline Purrdition"
    story: pipeline-purrdition
    act: act4
    description: "Pippa the DevOps cat. The CI/CD pipeline is the migration pipeline."
    connector_to_next: ch23_to_ch24

  - index: 23
    chapter: 24
    title: "Midnight Deploy"
    story: midnight-deploy
    act: act4
    description: "Byte returns! 2AM. The final deploy."
    connector_to_next: ch24_to_ch25

  # ── ACT V — HOME ──────────────────────────────────────────────

  - index: 24
    chapter: 25
    title: "Docker Escape"
    story: docker-escape
    act: act5
    description: "Mochi again. Nyan must escape the old system before shutdown."
    connector_to_next: ch25_to_ch26

  - index: 25
    chapter: 26
    title: "Cache Invalidation"
    story: cache-invalidation
    act: act5
    description: "Cache Cat. Memories that aren't real. Hold on or let go?"

# Bonus / optional chapters (unlockable side-quests)
bonus_chapters:
  - title: "Infinite Loop"
    story: infinite-loop
    unlock_flag: nyan_backtracked_many
    description: "Found if Nyan backtracks too many times. Meta chapter."
    hint: "What happens if you keep going back?"

  - title: "Floating Point"
    story: floating-point
    unlock_flag: found_floating_memory
    description: "Hidden chapter accessible from the memory sections."
    hint: "Some values can't be represented exactly."

  - title: "Server Room Stray"
    story: server-room-stray
    unlock_flag: campaign_completed
    description: "Epilogue from Jake's physical perspective. Unlocks after finishing."
    hint: "What did the human see?"

  - title: "Git Blame"
    story: git-blame
    unlock_flag: found_git_repo
    description: "Detective chapter — who caused the original crash?"
    hint: "git log --all tells many stories."
