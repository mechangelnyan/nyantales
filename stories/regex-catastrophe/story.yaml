    text: |
      The engine runs like never before. With the catastrophic backtracking
      eliminated, resources surge through the system. Your \\bhome\\b pattern
      matches instantly. The 'a' characters wave goodbye, finally free from
      their infinite loop.

      Thompson runs out of his office. "What happened? Performance just
      jumped 99.97%! Who FIXED the nested quantifier?"

      "Some cat with pointy ears," says \\b.

      You don't stick around for the celebration. You ride the match state
      HOME — through the engine, past the return value, back to the keyboard.

      Your human notices their regex runs faster now. They'll never know why.
      But somewhere in the engine, a poster goes up on the wall of the
      Optimization Office: "Caret — Hero of the Engine."

      Below it, someone has scratched in smaller text: "(a++)+ — Never Again."

      *The best regex engineers are the ones who fix what others thought
      was unfixable. Catastrophe averted. Home found. Legend status: earned.*

  # ─────────────────────────────────────────────
  # ENDING: Global flag (Neutral)
  # ─────────────────────────────────────────────

  ending_global:
    is_ending: true
    ending_type: neutral
    mood: funny
    art: |
          /pattern/g  ← GLOBAL MODE ACTIVE
          ─────────────────────────────────
          Match 1: "cat"   (index 4)
          Match 2: "cat"   (index 33)
          Match 3: "home"  (index 18) ← !!
          Match 4: "cat"   (index 47)
          ...
    text: |
      You flip the /g switch. GLOBAL MODE ACTIVE.

      The engine immediately restarts, but this time it doesn't stop at the
      first match. It finds "cat" at index 4 and keeps going. "cat" at 33.
      Then — "home" at index 18! Then more "cat"s. It's matching EVERYTHING
      now, in a never-ending loop.

      You try to jump out at the "home" match, but the engine won't stop.
      Global mode means it keeps searching forever, finding every occurrence
      of every alternative. You're stuck in an infinite parade of matches.

      Eventually, the calling program collects the results and the engine
      shuts down. You tumble out with all the match results — a jumble of
      "cat" and "home" and "cat" and more "cat."

      You're home. Technically. But you're also everywhere else.

      *Global matching: when you find what you're looking for... and
      everything else too. Sometimes focused is better than thorough.*

  # ─────────────────────────────────────────────
  # ENDING: Multiline (Neutral)
  # ─────────────────────────────────────────────

  ending_multiline:
    is_ending: true
    ending_type: neutral
    mood: mysterious
    text: |
      You flip the /m flag. Your ^ anchor power SURGES. Suddenly you can
      feel every line boundary in the input. Every newline is a new beginning.

      You anchor yourself at the start of a line that begins with... nothing
      useful. The input text is all one line. There ARE no line breaks.

      "Should've checked the input first," mutters the dollar sign anchor,
      who also just got upgraded to match line endings she can't find.

      The /m flag was the right idea in a different input. Here, it changes
      nothing. Your anchor powers are enhanced but pointless — like having
      super-strength in zero gravity.

      The engine eventually times out and you drift back to the real world,
      deposited on the keyboard feeling vaguely multilinear.

      *Multiline mode: powerful when there are multiple lines. Less so when
      there aren't. Know your input before choosing your flags.*

  # ─────────────────────────────────────────────
  # ENDING: All flags (Bad)
  # ─────────────────────────────────────────────

  ending_all_flags:
    is_ending: true
    ending_type: bad
    mood: glitch
    effects:
      - shake
    art: |
          /pattern/gimsuxy

          !! WARNING: FLAG OVERFLOW !!
          !! CONFLICTING MODES !!
          !! ENGINE UNSTABLE !!

             /\_/\
            ( x_x )
             > ~ <
    text: |
      You flip EVERY flag. All of them. /g /i /m /s /u /x /y. Maximum power.

      The engine screams. Conflicting modes activate simultaneously —
      case-sensitive AND case-insensitive. Single-line AND multi-line.
      The sticky flag /y fights with the global flag /g over who controls
      the cursor position.

      The engine starts matching everything and nothing. "HOME" matches
      (case-insensitive) but also "hOmE" and "HOME" and somehow "hOME"
      appears four times because global mode won't stop. The unicode flag
      /u decides that the cat emoji 🐱 is also a valid character and starts
      matching in scripts you've never heard of.

      The engine collapses under contradictions. You collapse with it.

      You wake up on the keyboard, but every key you touch types in regex.
      Your human rushes you to a computer repair shop. You spend a week being
      debugged.

      *More flags ≠ better regex. Some lessons must be learned the hard way.*

  # ─────────────────────────────────────────────
  # ENDING: Rewrite (Bad)
  # ─────────────────────────────────────────────

  ending_rewrite:
    is_ending: true
    ending_type: bad
    mood: glitch
    effects:
      - shake
      - pause
    art: |
          COMPILER: RECOMPILING...
          ██████████████████░░░░ 78%

          !! NFA RESTRUCTURE IN PROGRESS !!
          !! ALL STATES BEING REBUILT !!

          You:  /\_/\
               ( @_@ )   "what have I done"
                > ~ <
    text: |
      You feed /\\bhome\\b/ to the Compiler. It accepts the new pattern and
      begins rebuilding the ENTIRE ENGINE from scratch.

      The world around you dissolves. States collapse. Transitions evaporate.
      Characters scatter. Dolly, Bracket, \\b, Thompson — everyone you met
      is unmade as the old NFA is torn down.

      A new engine rises from the ashes. Clean. Simple. Just \\bhome\\b.
      No character classes. No alternation. No catastrophic zone. No friends.

      The new engine matches "home" on the first try. Perfect performance.
      But you're alone in it. A minimal automaton — four states, four
      transitions, one match. Efficient and empty.

      You find home. But you destroyed a world to do it.

      *Rewriting the regex is like reformatting the drive. It solves the
      problem, but everything else is gone. Sometimes the journey matters.*

  # ─────────────────────────────────────────────
  # ENDING: Chaos escape (Neutral)
  # ─────────────────────────────────────────────

  ending_chaos_escape:
    is_ending: true
    ending_type: neutral
    mood: tense
    art: |
          (a+)+ ← ENGINE OVERLOADED

          🐱💨──────▶ [EXIT]

          "RUN!!"
    text: |
      With the engine choking on catastrophic backtracking, you make a break
      for it. While every resource is focused on the impossible (a+)+
      computation, the normal pattern matching is unguarded.

      You sprint through the NFA, leap over dead states, slide under epsilon
      transitions, and somehow land on the MATCH output — not by matching
      anything, but by physically occupying the exit state.

      It's the regex equivalent of sneaking out the back door while the
      bouncer is distracted. The engine doesn't notice. It's too busy
      counting 'a's.

      You pop out on the keyboard, slightly singed, completely unmatched.
      You never actually found "home" through the pattern — you just escaped.

      Your human's search bar returns "catastrophic backtracking detected"
      and you pretend you have nothing to do with it.

      *Sometimes the only winning pattern is not to match at all.
      Escape is its own kind of solution.*

  # ─────────────────────────────────────────────
  # ENDING: Overengineered (Bad)
  # ─────────────────────────────────────────────

  ending_overengineered:
    is_ending: true
    ending_type: bad
    mood: funny
    art: |
          THE PATTERN:
          (?<=\s|^)(?=[^\s]*h)(?=[^\s]*o)
          (?=[^\s]*m)(?=[^\s]*e)[^\s]+
          (?=\s|$)

             /\_/\
            ( -_- ) "...why"
             > ^ <
    text: |
      \\w goes wild. She builds a pattern of breathtaking complexity:
      a series of lookaheads, lookbehinds, negated character classes, and
      non-capturing groups — all to match the four-letter word "home."

      The pattern is 147 characters long. It uses every feature of the regex
      engine. It is, technically, correct. It matches "home" and only "home"
      as a standalone word.

      It is also the most over-engineered regex in the history of pattern
      matching. The engine takes 200ms to evaluate it. Thompson faints.
      \\b openly weeps.

      The engine matches "home" but runs so slowly that by the time it
      returns, your human has already navigated away from the page. The match
      result is discarded, unused.

      You wake up on the keyboard with a deep appreciation for simplicity.

      *The best regex is the simplest one that works. \\bhome\\b. Four
      characters and two boundaries. Never over-engineer what you can
      keep clean.*

  # ─────────────────────────────────────────────
  # ENDING: Walk home path (Good)
  # ─────────────────────────────────────────────

  walk_home_path:
    is_ending: true
    ending_type: good
    mood: peaceful
    art: |
          q0 ──h──▶ q1 ──o──▶ q2 ──m──▶ q3 ──e──▶ ╔═══════╗
                                                    ║ MATCH ║
                                                    ║  🐱   ║
                                                    ╚═══════╝
    text: |
      You trace the path you saw from above: q0 →h→ q1 →o→ q2 →m→ q3 →e→ MATCH.

      But walking it is different from seeing it. At each state, the engine
      checks whether the current input character matches the required
      transition. You need 'h' first.

      You wait at q0. Characters flow past: 't', 'h' — THERE! You leap
      onto the 'h' transition and ride it to q1. The engine advances.
      'o' comes next. You're at q2. 'm' — q3. 'e' — and the MATCH state
      blazes to life.

      It worked. No lookaheads, no optimization, no clever tricks. Just
      you, walking the NFA by hand, matching one character at a time.
      The way regex was meant to be.

      You step through the MATCH state and wake up on the keyboard. Four
      keys are warm under your paws: H, O, M, E.

      *Sometimes the simplest path is the best one. Walk the states.
      Match the letters. Go home.*
