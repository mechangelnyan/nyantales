        │       ( ◕.◕ )  "The process worked... eventually."  │
        │        > ^ <                                        │
        └─────────────────────────────────────────────────────┘
    text: |
      PR #4892 — the original PR that should have been merged four years ago — finally lands. Through the proper process: reviewed, approved, CI green, deployed through the pipeline.

      It took a stray packet-cat to push it across the finish line, but the fix is clean. No cowboy coding, no hotfixes, no shortcuts. Just the right change, through the right process, four years late.

      The deploy bot posts in Slack: "PR #4892 deployed to production. /home redirect active."

      Dev-cat-3 reacts with 🎉. Dev-cat-7 reacts with 😭. A ghost reaction appears from an account called `intern_who_loved_cats`, inactive for three years.

      Someone is watching. And they're smiling.
    ending_text: |
      🐱 ENDING: "By the Book"
      You followed the process. The right fix, through the right channels.
      PR #4892 finally merged — four years after it was opened.
      The intern got their merge notification. Wherever they are.

  ending_found_home:
    mood: peaceful
    is_ending: true
    ending_type: neutral
    art: |
        ┌─────────────────────────────────────────────────────┐
        │                                                     │
        │   /app/page/home                                    │
        │                                                     │
        │        /\_/\                                        │
        │       ( -.- )  *purring*                             │
        │        > ^ <                                        │
        │       /|   |\                                       │
        │                                                     │
        │   "I found it. That's enough for today."            │
        │                                                     │
        └─────────────────────────────────────────────────────┘
    text: |
      You found /home. It's here, at /app/page/home, alive and well.

      You didn't fix the redirect. The old links still 404. But you know the page exists, and you know where it is, and you know what needs to be done.

      Sometimes finding the answer is enough. The fix can wait for another day, another cat, another request.

      You curl up on /app/page/home and close your eyes. The data streams around you, warm and constant. You are home.
    ending_text: |
      🐱 ENDING: "Found, Not Fixed"
      You discovered that /home lives on at /app/page/home.
      The redirect still isn't set up, but at least you know the truth.
      Sometimes the journey is the point.

  ending_bandaid:
    mood: mysterious
    is_ending: true
    ending_type: neutral
    art: |
        ┌─────────────────────────────────────────────────────┐
        │                                                     │
        │   CDN EDGE RULE: /home → 301 → /app/page/home      │
        │   Status: ✅ Active (edge only)                     │
        │                                                     │
        │   Origin: Still returns 404 for /home               │
        │                                                     │
        │        /\_/\                                        │
        │       ( >.> )  "It works... mostly."                 │
        │        > ^ <                                        │
        │                                                     │
        └─────────────────────────────────────────────────────┘
    text: |
      The CDN fix works. For most users, /home resolves now. The redirect happens at the edge, fast and invisible.

      But you know it's a band-aid. The origin is still broken. Internal tools, health checks, and anyone hitting the server directly still gets a 404. The nginx.conf still has that commented-out line 47, gathering digital dust.

      Dev-cat-7 marks the issue as "Won't Fix (workaround in place)." It'll stay that way for years, probably.

      You did something. But not the right thing. The intern's redirect is still waiting.
    ending_text: |
      🐱 ENDING: "The Band-Aid"
      You fixed it at the edge, not the origin. Users are happy.
      But line 47 is still commented out. The proper fix waits.

  ending_timeout:
    mood: tense
    is_ending: true
    ending_type: bad
    art: |
        ┌─────────────────────────────────────────────────────┐
        │                                                     │
        │   HTTP/1.1 504 Gateway Timeout                      │
        │                                                     │
        │   The server did not receive a timely response.     │
        │                                                     │
        │        /\_/\                                        │
        │       ( x.x )  *connection terminated*              │
        │        > ^ <                                        │
        │                                                     │
        │   Error: upstream timed out                          │
        │   (110: Connection timed out)                        │
        │                                                     │
        └─────────────────────────────────────────────────────┘
    text: |
      You took too long. The keep-alive timer expired, and the connection dropped.

      Your request dissolves into the void — a timeout, just another statistic in the error logs. 504 Gateway Timeout. The server moved on. The client moved on. Only you, Packet, are left in the space between.

      /home is still 404. The redirect is still commented out. The intern's fix is still waiting. And now there's one more error in the logs that nobody will read.

      Maybe the next request will find the way.
    ending_text: |
      🐱 ENDING: "Timed Out"
      You ran out of time. The connection closed.
      /home is still 404. Try again?

  ending_secret_intern:
    mood: mysterious
    is_ending: true
    ending_type: secret
    effects:
      - glitch
    art: |
        ┌─────────────────────────────────────────────────────┐
        │                                                     │
        │   commit 7a3f9c2                                    │
        │   Author: intern_who_loved_cats                     │
        │   Date: 4 years ago                                 │
        │                                                     │
        │   "Added custom 404 page with cat animation.        │
        │    Hope this makes people smile when they            │
        │    hit a dead link. 🐱"                              │
        │                                                     │
        │        /\_/\         /\_/\                          │
        │       ( ^.^ )  ←→  ( ^.^ )                         │
        │        > ^ <         > ^ <                          │
        │       Packet     The Intern                         │
        │                                                     │
        │   "You found my message."                           │
        │                                                     │
        └─────────────────────────────────────────────────────┘
    text: |
      You found the GIF. You read the hidden comment. You followed the trail to line 47. And you fixed it — through a PR, the way the intern tried to.

      As the deploy goes live, something strange happens. In the server logs, a ghost session flickers — `intern_who_loved_cats`, last active three years ago — and posts one final message to the deploy channel:

      "Thank you. 🐱"

      The session expires immediately after. The logs will show no record of it — except, maybe, in the CDN cache, where nothing truly dies.

      You'll never know if it was a ghost in the machine or a real person who got the merge notification. But it doesn't matter.

      The cat found its way home. Both of them did.
    ending_text: |
      🏆 SECRET ENDING: "The Intern's Legacy"
      You found the hidden message, followed the trail, and completed what the intern started.
      A four-year-old story, finally resolved. Some bugs outlive the people who find them.
      But sometimes, a stray cat finishes what an intern began.

  # Fallback scene for the secret ending trigger
  rollback_route:
    mood: tense
    effects:
      - shake
    art: |
        ┌─────────────────────────────────────────────────────┐
        │  > server.routes.rollback("/home")                  │
        │                                                     │
        │  ⚠ WARNING: Rolling back will restore the legacy    │
        │  route handler, not just the redirect.              │
        │  This may conflict with the /app router.            │
        │                                                     │
        │  Proceed? [Y/n]                                     │
        └─────────────────────────────────────────────────────┘
    text: |
      You attempt the rollback, but the debug console warns you: restoring the old /home route would bring back the entire legacy handler — not just a redirect. It would conflict with the /app router and potentially break everything.

      A rollback is the wrong tool. What you need is a redirect — a simple 301 that says "this moved, go there instead." The kind of fix that was already written and just needs to be uncommented.

      The debug console's timer ticks: 45 seconds of debug mode left.
    choices:
      - label: "Add the redirect instead — the right fix"
        goto: add_redirect
      - label: "Rush to nginx.conf before debug mode expires"
        goto: config_quest

  add_redirect:
    mood: tense
    location: "packet@debug:/__internal$"
    art: |
        ┌─────────────────────────────────────────────────────┐
        │  > server.routes.add({                              │
        │      path: "/home",                                 │
        │      handler: "redirect",                           │
        │      target: "/app/page/home",                      │
        │      code: 301                                      │
        │    })                                               │
        │                                                     │
        │  ✅ Route added (runtime only — not persisted)      │
        │  ⚠ Will be lost on next server restart              │
        │                                                     │
        │  Debug mode: 30 seconds remaining                   │
        └─────────────────────────────────────────────────────┘
    text: |
      You add the redirect through the debug console. It works immediately — /home now redirects to /app/page/home.

      But there's a catch: runtime route changes aren't persisted. The next time the server restarts — or the next deploy — the redirect will vanish. You've fixed it temporarily, but the permanent fix still lives in nginx.conf, line 47, commented out.

      You have 30 seconds of debug mode left. Enough time to do one more thing.
    choices:
      - label: "Head to nginx.conf and make the fix permanent"
        goto: config_quest
      - label: "Good enough for now — at least it works today"
        goto: ending_found_home
      - label: "File a PR to make it permanent"
        goto: write_pr
        requires_flag: found_htaccess_clue
