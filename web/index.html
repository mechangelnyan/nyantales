<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00d4ff">
  <meta name="description" content="Interactive cat stories from the terminal — a visual novel experience">
  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="NyanTales — Interactive Cat Stories">
  <meta property="og:description" content="30 branching visual novel adventures starring cats in a cyberpunk terminal world. Play in your browser — free, offline-capable, no install needed.">
  <meta property="og:url" content="https://mechangelnyan.github.io/nyantales/web/">
  <meta property="og:image" content="https://mechangelnyan.github.io/nyantales/web/assets/icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="NyanTales">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NyanTales — Interactive Cat Stories">
  <meta name="twitter:description" content="30 branching visual novel adventures starring cats in a cyberpunk terminal world.">
  <meta name="twitter:image" content="https://mechangelnyan.github.io/nyantales/web/assets/icon-512.png">
  <link rel="canonical" href="https://mechangelnyan.github.io/nyantales/web/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "NyanTales",
    "description": "30 branching visual novel adventures starring cats in a cyberpunk terminal world. Play in your browser — free, offline-capable, no install needed.",
    "url": "https://mechangelnyan.github.io/nyantales/",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "image": "https://mechangelnyan.github.io/nyantales/web/assets/icon-512.png",
    "author": { "@type": "Person", "name": "mechangelnyan" },
    "genre": "Visual Novel",
    "numberOfItems": 30
  }
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; script-src 'self'; worker-src 'self'">
  <meta name="color-scheme" content="dark">
  <title>NyanTales — Visual Novel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preload" href="js/js-yaml.min.js" as="script">
</head>
<body>
  <a href="#story-list" class="skip-link">Skip to stories</a>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen" role="status" aria-label="Loading NyanTales">
    <div class="loading-cat">
      <pre class="loading-ascii"> /\_/\
( o.o )
 > ^ <</pre>
    </div>
    <div class="loading-text">Loading stories...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div id="app" aria-hidden="true">
    <!-- Title Screen -->
    <div id="title-screen" class="screen active" role="main" aria-label="Story Selection">
      <div class="title-bg">
        <div class="scanlines" aria-hidden="true"></div>
        <div class="title-content">
          <pre class="title-ascii" aria-hidden="true">
 /\_/\  ╔═══════════════════════╗  /\_/\
 ( o.o ) ║   N Y A N T A L E S   ║ ( o.o )
 > ^ <  ╚═══════════════════════╝  > ^ <
          </pre>
          <h1 class="sr-only">NyanTales — Interactive Cat Stories</h1>
          <p class="title-subtitle">Interactive Cat Stories from the Terminal</p>
          <div id="title-stats" class="title-stats" aria-label="Play statistics"></div>
          <div class="title-actions" role="toolbar" aria-label="Main actions">
            <button id="btn-campaign" class="campaign-btn" aria-label="Play the connected campaign">📖 Campaign</button>
            <button id="btn-continue" class="continue-btn hidden" aria-label="Continue last game">▶ Continue</button>
            <button id="btn-random" class="gallery-btn" aria-label="Play a random story">🎲 Random</button>
            <button id="btn-install" class="install-btn hidden" aria-label="Install NyanTales as an app">📲 Install App</button>
            <button id="btn-gallery" class="gallery-btn" aria-label="Browse character gallery">🐱 Characters</button>
            <button id="btn-achievements" class="achievements-btn" aria-label="View achievements">🏆 Achievements</button>
            <button id="btn-stats" class="gallery-btn" aria-label="View detailed statistics">📊 Stats</button>
            <button id="btn-about" class="gallery-btn" aria-label="About NyanTales">ℹ️ About</button>
          </div>
          <div id="chapter-grid" class="chapter-grid" role="list" aria-label="Campaign chapters"></div>
          <div class="section-divider" aria-hidden="true"><span>── All Stories ──</span></div>
          <div id="story-filter" class="story-filter" role="search" aria-label="Filter stories">
            <div class="story-filter-inner">
              <div class="story-search-wrap">
                <input type="text" id="filter-input" placeholder="🔍 Search stories, characters, or descriptions..." autocomplete="off" aria-label="Search stories by title, character, or description" />
                <button id="filter-clear" class="story-search-clear hidden" type="button" aria-label="Clear story search, filter, and sort">✕</button>
              </div>
              <div class="filter-row">
                <div class="filter-tags" role="tablist" aria-label="Story filters">
                  <button class="filter-tag active" data-filter="all" role="tab" aria-selected="true">All</button>
                  <button class="filter-tag" data-filter="favorites" role="tab" aria-selected="false">❤️ Favorites</button>
                  <button class="filter-tag" data-filter="completed" role="tab" aria-selected="false">✅ Completed</button>
                  <button class="filter-tag" data-filter="new" role="tab" aria-selected="false">🆕 New</button>
                </div>
                <div class="sort-control" aria-label="Sort stories">
                  <label class="sort-label" for="sort-select">Sort:</label>
                  <select id="sort-select" class="sort-select" aria-label="Sort order">
                    <option value="title-asc">A → Z</option>
                    <option value="title-desc">Z → A</option>
                    <option value="favorites">Favorites First</option>
                    <option value="recent">Recently Played</option>
                    <option value="progress">Most Progress</option>
                    <option value="time-short">Shortest First</option>
                    <option value="time-long">Longest First</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div id="story-list" class="story-grid" role="list" aria-label="Available stories"></div>
        </div>
      </div>
    </div>

    <!-- Story Screen (Visual Novel) -->
    <div id="story-screen" class="screen" role="main" aria-label="Visual Novel Reader">
      <div class="vn-container">
        <!-- Background layer -->
        <div id="vn-background" class="vn-bg" aria-hidden="true"></div>

        <!-- Character sprite layer -->
        <div id="vn-sprites" class="vn-sprites" aria-hidden="true"></div>

        <!-- Location bar -->
        <div id="vn-location" class="vn-location hidden" role="status" aria-live="polite"></div>

        <!-- Mood indicator -->
        <div id="vn-mood" class="vn-mood hidden" aria-hidden="true"></div>

        <!-- ASCII art display -->
        <div id="vn-art" class="vn-art hidden" aria-hidden="true"></div>

        <!-- Dialogue / Narrative box -->
        <div id="vn-textbox" class="vn-textbox" role="log" aria-live="polite" aria-label="Story text">
          <div id="vn-speaker" class="vn-speaker hidden" aria-label="Speaker"></div>
          <div id="vn-text" class="vn-text"></div>
          <button id="vn-click-indicator" class="vn-click-indicator hidden" type="button" aria-label="Continue to next scene">Continue ▶</button>
          <!-- Choices now live inside the textbox, below the story text -->
          <div id="vn-choices" class="vn-choices hidden" role="group" aria-label="Story choices" aria-live="polite"></div>
        </div>

        <!-- Inventory bar -->
        <div id="vn-inventory" class="vn-inventory hidden" role="status" aria-label="Inventory"></div>

        <!-- Conditional text -->
        <div id="vn-conditional" class="vn-conditional hidden" aria-live="polite"></div>

        <!-- Ending overlay -->
        <div id="vn-ending" class="vn-ending hidden" role="dialog" aria-label="Story ending"></div>

        <!-- HUD -->
        <div class="vn-hud" role="toolbar" aria-label="Game controls">
          <button id="btn-back" class="hud-btn" title="Back to Stories (Esc)" aria-label="Back to story list">⏎</button>
          <button id="btn-rewind" class="hud-btn hud-dim" title="Back one scene (B)" aria-label="Go back one scene">⏪</button>
          <button id="btn-save" class="hud-btn" title="Save/Load (Q)" aria-label="Save or load game">💾</button>
          <button id="btn-hud-more" class="hud-btn hud-overflow-toggle" title="More controls" aria-label="Show more controls">⋯</button>
          <button id="btn-fast" class="hud-btn hud-collapsible" title="Toggle Fast Mode" aria-label="Toggle fast text mode">⏩</button>
          <button id="btn-auto" class="hud-btn hud-collapsible hud-inactive" title="Auto-Play (A)" aria-label="Toggle auto-play" aria-pressed="false">▶️</button>
          <button id="btn-history" class="hud-btn hud-collapsible" title="Text History (H)" aria-label="View text history">📜</button>
          <button id="btn-scenes" class="hud-btn hud-collapsible" title="Scene Select (G)" aria-label="Open scene select">📍</button>
          <button id="btn-settings" class="hud-btn hud-collapsible" title="Settings (S)" aria-label="Open settings">⚙️</button>
          <button id="btn-audio" class="hud-btn hud-collapsible hud-inactive" title="Toggle Ambient Audio (M)" aria-label="Toggle ambient audio" aria-pressed="false">🔇</button>
          <button id="btn-routemap" class="hud-btn hud-collapsible" title="Route Map (R)" aria-label="View story route map">🗺️</button>
          <button id="btn-help" class="hud-btn hud-collapsible" title="Keyboard Shortcuts (?)" aria-label="Show keyboard shortcuts">❓</button>
        </div>
      </div>
    </div>
  </div>

  <noscript>
    <div class="noscript-msg">
      <div>
        /\_/\<br>( o.o ) NyanTales requires JavaScript to run.<br> > ^ < <br><br>
        Please enable JavaScript and reload the page.
      </div>
    </div>
  </noscript>

  <script src="js/overlay-mixin.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/share.js"></script>
  <script src="js/safe-storage.js"></script>
  <script src="js/error-boundary.js"></script>
  <script src="js/route-map.js"></script>
  <script src="js/stats-dashboard.js"></script>
  <script src="js/keyboard-help.js"></script>
  <script src="js/about.js"></script>
  <script src="js/story-intro.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="js/focus-trap.js"></script>
  <script src="js/confirm-dialog.js"></script>
  <script src="js/scene-select.js"></script>
  <script src="js/yaml-parser.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/campaign.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/portraits.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/achievement-panel.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/settings-panel.js"></script>
  <script src="js/history.js"></script>
  <script src="js/story-info.js"></script>
  <script src="js/save-manager.js"></script>
  <script src="js/touch.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/title-browser.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
